<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SharedCalendar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F5F0EB; color: #2C2C2E; line-height: 1.6; }
        .container { max-width: 640px; margin: 0 auto; padding: 60px 24px; }
        h1 { font-size: 2rem; margin-bottom: 8px; }
        .subtitle { color: #8E8E93; font-size: 1.1rem; margin-bottom: 40px; }
        .links a { display: block; padding: 16px 20px; background: white; border-radius: 12px; color: #C27044; text-decoration: none; font-weight: 600; margin-bottom: 12px; transition: transform 0.2s; }
        .links a:hover { transform: translateY(-2px); }
        .links span { color: #8E8E93; font-weight: 400; font-size: 0.9rem; display: block; margin-top: 2px; }
        .footer { margin-top: 48px; color: #8E8E93; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SharedCalendar</h1>
        <p class="subtitle">Del kalenderen med dem der betyder noget.</p>
        <div class="links">
            <a href="/sharedcalendar-site/privacy">
                Privacy Policy
                <span>Privatlivspolitik</span>
            </a>
            <a href="/sharedcalendar-site/terms">
                Terms of Service
                <span>Servicevilkår</span>
            </a>
        </div>
        <p class="footer">
            &copy; 2026 Jonas Hansen &middot; <a href="mailto:Jonas0504hansen@gmail.com" style="color: #C27044;">Kontakt</a>
        </p>
    </div>
</body>
</html>
